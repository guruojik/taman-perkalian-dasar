name: Deploy Storyline to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Extract ZIP File
        run: |
          # Perintah langsung untuk mengekstrak 1 file ZIP tunggal
          unzip *.zip -d .
          
          # Memastikan file utama index.html berada di folder terluar (root)
          if [ ! -f index.html ]; then
            mv */index.html . 2>/dev/null || true
            mv */story_content . 2>/dev/null || true
            mv */analytics-frame . 2>/dev/null || true
          fi

      - name: Upload Website Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
